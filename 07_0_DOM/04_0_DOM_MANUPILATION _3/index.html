<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>DOM Manipulation</h1>

    <div id="container">
        <p id="target">This is target element</p>
    </div>

    <div class="buttons">
        <button onclick="appendEl()">Append</button>
        <button onclick="prependEl()">Prepend</button>
        <button onclick="beforeEl()">Before</button>
        <button onclick="afterEl()">After</button>
        <button onclick="removeEl()">Remove</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
